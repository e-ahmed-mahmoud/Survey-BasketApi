@if (loading()) {
<div class="loading-center">
  <mat-spinner diameter="40" />
</div>
} @else if (questions().length === 0) {
<div class="empty-state">
  <mat-icon>quiz</mat-icon>
  <p>No questions added to this poll yet.</p>
  <p class="text-muted">Questions will appear here once you add them.</p>
</div>
}
@else {

<div class="questions-table-wrapper">
  <table mat-table [dataSource]="questions()" class="questions-table">
    <!-- Content Column -->
    <ng-container matColumnDef="content">
      <th mat-header-cell *matHeaderCellDef>Question</th>
      <td mat-cell *matCellDef="let element">
        <span class="question-content"> {{element.content}} </span>
      </td>
    </ng-container>

    <!-- Answers Count Column -->
    <ng-container matColumnDef="answers">
      <th mat-header-cell *matHeaderCellDef>Answers</th>
      <td mat-cell *matCellDef="let element">
        <span class="answer-count">
          <mat-icon>list_alt</mat-icon>
          {{ getTotalAnswers( element )}}
        </span>
      </td>
    </ng-container>

    <!-- Actions Column -->
    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef>Actions</th>
      <td mat-cell *matCellDef="let element">
        @if (isAdmin()) {
        <button mat-icon-button matTooltip="Delete" (click)="deleteQuestion(element.id)" class="delete-btn">
          <mat-icon>delete</mat-icon>
        </button>
        }
        @else
        { <span class="no-actions"> no actions</span> }
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;" class="question-row"></tr>
  </table>

  <!-- Pagination -->
  <mat-paginator [length]="totalCount()" [pageSize]="pageSize()" [pageSizeOptions]="[5, 10, 25, 50]"
    (page)="onPageChange($event)" showFirstLastButtons />
</div>
}
