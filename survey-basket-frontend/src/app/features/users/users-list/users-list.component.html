<div class="fade-in container-fluid">
  <div class="page-header">
    <div class="header-left">
      <h1 class="page-title">Users</h1>
      <p class="page-subtitle">Manage system users and their roles</p>
    </div>
    <div class="header-actions">
      <button mat-raised-button color="primary" id="add-user-btn">
        <mat-icon>person_add</mat-icon> Add User
      </button>
    </div>
  </div>

  @if (loading()) { <mat-progress-bar mode="indeterminate" /> }

  <div class="sb-table-container">
    <table mat-table [dataSource]="dataSource">
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>Name</th>
        <td mat-cell *matCellDef="let u">{{ u.firstName }} {{ u.lastName }}</td>
      </ng-container>
      <ng-container matColumnDef="email">
        <th mat-header-cell *matHeaderCellDef>Email</th>
        <td mat-cell *matCellDef="let u">{{ u.email }}</td>
      </ng-container>
      <ng-container matColumnDef="roles">
        <th mat-header-cell *matHeaderCellDef>Roles</th>
        <td mat-cell *matCellDef="let u">
          @for (role of u.roles; track role) {
          <span class="status-chip active" style="margin-right:4px">{{ role }}</span>
          }
        </td>
      </ng-container>
      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef>Status</th>
        <td mat-cell *matCellDef="let u">
          <span class="status-chip" [class.published]="!u.isDisabled" [class.draft]="u.isDisabled">
            {{ u.isDisabled ? 'Disabled' : 'Active' }}
          </span>
        </td>
      </ng-container>
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Actions</th>
        <td mat-cell *matCellDef="let u">
          <button mat-icon-button [id]="'edit-user-' + u.id">
            <mat-icon>edit</mat-icon>
          </button>
        </td>
      </ng-container>
      <tr mat-header-row *matHeaderRowDef="cols"></tr>
      <tr mat-row *matRowDef="let row; columns: cols;"></tr>
      <tr class="mat-row" *matNoDataRow>
        <td class="mat-cell" colspan="5" style="text-align:center;padding:48px;color:var(--text-muted)">No users found
        </td>
      </tr>
    </table>
  </div>
</div>
